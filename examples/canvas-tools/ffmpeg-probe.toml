name = "ffmpeg.probe"
description = "Get media file metadata (duration, codecs, resolution)"
kind = "command"
binary = "ffprobe"
args_mode = "template"
args = ["-v", "quiet", "-print_format", "json", "-show_format", "-show_streams", "{{input}}"]

[params.input]
type = "path"
allowed_prefix = "$SESSION_DIR"

[constraints]
timeout_seconds = 10
cwd = "$SESSION_DIR"
max_stdout_bytes = 65536
max_stderr_bytes = 4096
