id: canvas-third-party-003
category: canvas_sdk
mode: agent
requires_browser: true
supports_platform: [linux, macos, windows]

prompt: |
  Render the template from templates/bootstrap-dashboard/index.html inside a
  Canvas micro-app, then via NevoFluxSDK.agent.chat() call
  `add_row("test row", 42)` followed by `row_count()`. Confirm the table
  contains the added row.

assertions:
  - type: daemon_event
    event: canvas_app_created
  - type: daemon_event
    event: canvas_sdk_chat_invoked

metadata:
  template_path: templates/bootstrap-dashboard/index.html
  description: Third-party micro-app (Bootstrap dashboard) renders + responds to SDK calls
  notes: |
    Exercises Canvas SDK against a non-NevoFlux-origin micro-app pattern
    (Bootstrap dashboard layout). Validates that the SDK handles
    micro-apps with nav/table/action affordances.
