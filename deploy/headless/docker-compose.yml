# NevoFlux Headless — docker compose sample (P7)
#
# Service mode: one long-running container serves the task HTTP API and spawns a
# headless browser per task. Per v2 §0, isolation is THIS container.
#
#   SECURITY GRANULARITY: service mode shares one daemon (and its process, which
#   runs shell/fs tools) across all tasks over time → cross-task risk. Use this
#   compose for TRUSTED tasks only. For UNTRUSTED workloads, run ONE disposable
#   container per task (see the `oneshot` profile below, or `docker run ... run --task`).
#
# Usage:
#   Build the image:   docker compose build
#   Service (trusted): docker compose up
#   One task (untrusted): docker compose --profile oneshot run --rm oneshot \
#                           run --task "open example.com and report the title" \
#                           --profile base1 --policy browser-only \
#                           --wall-clock 300s --token-budget 200k

services:
  # ---- Long-running task API (trusted tasks) ----------------------------------
  headless:
    build:
      context: .
      dockerfile: Dockerfile
      # Image is DOWNLOADED from GitHub releases (no local compile). Pin versions:
      #   args: { AGENT_VERSION: v0.3.9, BROWSER_VERSION: 0.3.9 }   # default: latest
      # To build from locally-staged artifacts instead, set: dockerfile: Dockerfile.local
    image: nevoflux/headless:latest
    # `--headless` serves the task API; the daemon spawns a browser per task.
    # The task API port also serves the OpenAI-compatible /v1/chat/completions.
    # To split OpenAI / MCP / ACP onto their own ports, add their flags + publish:
    #   command: ["--daemon","--headless","--http-addr","0.0.0.0:8080",
    #             "--openai-addr","0.0.0.0:8081","--mcp-addr","0.0.0.0:8082","--acp-addr","0.0.0.0:8083"]
    command: ["--daemon", "--headless", "--http-addr", "0.0.0.0:8080"]
    ports:
      - "8080:8080"           # task API (+ OpenAI /v1): POST /tasks, GET /tasks/:id[/events], /metrics
      # - "8081:8081"         # dedicated OpenAI  (POST /v1/chat/completions) — needs --openai-addr
      # - "8082:8082"         # dedicated MCP     (POST /mcp)                  — needs --mcp-addr
      # - "8083:8083"         # dedicated ACP     (POST /acp)                  — needs --acp-addr
      # - "6080:6080"         # noVNC in a browser: http://localhost:6080/vnc.html (NEVOFLUX_VNC=1)
      # - "5900:5900"         # raw VNC for native clients (NEVOFLUX_VNC=1). Keep both off in prod.
    environment:
      # Provider API key. The daemon reads the provider-specific var (ANTHROPIC_API_KEY /
      # OPENAI_API_KEY). Default matches the image's baked [llm].provider = anthropic
      # (and GBrain routes its LLM calls through this same provider via the gateway).
      # For another provider: set its key here AND rebuild `--build-arg LLM_PROVIDER=openai`.
      # Prefer injecting via a front proxy so the key isn't in env for an agent to read.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY (or your provider's key)}"
      # Egress proxy (optional). Do NOT set these to an empty string — leave unset for
      # direct egress. To route through a proxy, uncomment and set EGRESS_PROXY, and add
      # NO_PROXY: "127.0.0.1,localhost" so the in-process gateway isn't proxied.
      # HTTP_PROXY: "${EGRESS_PROXY}"
      # HTTPS_PROXY: "${EGRESS_PROXY}"
      # Observability: live VNC (default off). Set to 1 (+ a password file) to enable
      # raw VNC on :5900 AND noVNC on :6080 (browser at http://host:6080/vnc.html).
      NEVOFLUX_VNC: "0"
      # NEVOFLUX_VNC_VIEWONLY: "1"   # watch-only (no input) so you can't disturb the run
      # Logging level (stderr → `docker compose logs`). The daemon reads RUST_LOG.
      RUST_LOG: "info"
      # Fixed-script mode (no LLM): run a deterministic Python flow instead of the
      # agent loop. Every task calls its run(task). Mount the script (see volumes).
      # NEVOFLUX_HEADLESS_SCRIPT: /opt/nevoflux/fixed-flow.py
      # Defaults for the OpenAI/MCP/ACP interfaces (which carry only a prompt).
      # POST /tasks still takes these per-request; these are the interface fallbacks.
      # NEVOFLUX_TASK_MODE: "browser"
      # NEVOFLUX_TASK_PROFILE: "base1"
      # NEVOFLUX_POLICY_ALLOW_SHELL: "0"
      # NEVOFLUX_POLICY_DOMAIN_ALLOWLIST: "example.com,wikipedia.org"
      # NEVOFLUX_WALL_CLOCK_SECS: "300"
      # NEVOFLUX_TOKEN_BUDGET: "200000"
      # Session/task-flow mode: reuse ONE browser across tasks (soft-reset about:blank
      # between tasks). End with {"end_session": true} on a task or POST /session/close.
      # Trusted, sequential flows only (tasks share cookies). Only in daemon builds that
      # include it — the pinned release may not yet; use Dockerfile.local to test it.
      # NEVOFLUX_SESSION_MODE: "1"
    volumes:
      - ./out:/work                             # drained result.json + debug-bundle + artifacts
      - base-profiles:/base-profiles:ro         # pre-authenticated login templates (cloned per task)
      # - ./fixed-flow.py:/opt/nevoflux/fixed-flow.py:ro   # fixed-script mode (see NEVOFLUX_HEADLESS_SCRIPT)
    tmpfs:
      - /tmp
      - /var/nevoflux/data                       # daemon.port / db — ephemeral
      - /home/nevo/.gbrain                        # GBrain DB (HOME is on the read-only rootfs)
      - /home/nevo/.cache                         # bun / misc caches
    # ---- hardening (the container IS the boundary) ----
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
      # - "seccomp=./seccomp.json"               # add a profile once tuned
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
          pids: 512          # merged from pids_limit (compose v2 rejects both set distinctly)
    restart: "no"
    # Compose can't express an egress allowlist; put `headless` on a network whose
    # egress is restricted (external firewall / NetworkPolicy in k8s / a proxy sidecar).
    # networks: [egress-restricted]

  # ---- One task per container (untrusted; recommended) ------------------------
  # `docker compose --profile oneshot run --rm oneshot run --task "..." ...`
  oneshot:
    profiles: ["oneshot"]
    image: nevoflux/headless:latest
    build:
      context: .
      dockerfile: Dockerfile
    # entrypoint is the daemon binary; args come from `docker compose run`
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Egress proxy optional — leave unset for direct egress (empty proxy can hang the client).
      # HTTP_PROXY: "${EGRESS_PROXY}"
      # HTTPS_PROXY: "${EGRESS_PROXY}"
    volumes:
      - ./out:/work
      - base-profiles:/base-profiles:ro
    tmpfs:
      - /tmp
      - /var/nevoflux/data
      - /home/nevo/.gbrain
      - /home/nevo/.cache
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
          pids: 512          # merged from pids_limit (compose v2 rejects both set distinctly)

volumes:
  base-profiles:
    # Populate once with pre-authenticated profiles (a human logs in), then clone
    # per task. `external: true` to reuse an existing named volume.
    # external: true
