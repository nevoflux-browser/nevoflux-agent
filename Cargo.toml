# Cargo.toml (workspace root)

[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/storage",
    "crates/llm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
repository = "https://github.com/user/nevoflux-agent"

[workspace.dependencies]
# LLM Framework
rig-core = "0.6"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

# Error handling
thiserror = "2"

# Storage
rusqlite = { version = "0.32", features = ["bundled"] }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tokio-stream = "0.1"

# HTTP client
reqwest = { version = "0.12", features = ["json", "stream"] }

# Async utilities
futures = "0.3"
async-trait = "0.1"

# Testing
proptest = "1"
test-case = "3"

# Mocking
mockall = "0.13"
