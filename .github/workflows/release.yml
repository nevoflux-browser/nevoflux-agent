name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: nevoflux-agent
  # ONNX Runtime bundled alongside the (load-dynamic) binary. Keep in lockstep
  # with EXPECTED_ORT_VERSION in crates/llm/src/embedding.rs and `ort_version`
  # in the justfile (fastembed 5 -> ort rc.12 -> ONNX Runtime 1.24.x).
  ORT_VERSION: "1.24.2"

jobs:
  # Download embedding model once, share across all platform builds
  download-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download embedding model
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import snapshot_download
          import os, glob, shutil
          cache_dir = 'models/fastembed'
          os.makedirs(cache_dir, exist_ok=True)
          snapshot_download(
              'intfloat/multilingual-e5-small',
              cache_dir=cache_dir,
              allow_patterns=[
                  'tokenizer.json',
                  'config.json',
                  'special_tokens_map.json',
                  'tokenizer_config.json',
                  'sentencepiece.bpe.model',
                  'onnx/model_O4.onnx',
                  'onnx/tokenizer.json',
                  'onnx/config.json',
                  'onnx/special_tokens_map.json',
                  'onnx/tokenizer_config.json',
                  'onnx/sentencepiece.bpe.model',
              ],
          )
          # Rename optimized model to model.onnx (fastembed expects this name)
          for f in glob.glob(os.path.join(cache_dir, '**', 'model_O4.onnx'), recursive=True):
              target = os.path.join(os.path.dirname(f), 'model.onnx')
              os.rename(f, target)
              print(f'Renamed {f} -> {target}')

          # Deduplicate HF cache: resolve symlinks in snapshots/, remove blobs/
          # HF cache stores data in blobs/ and symlinks in snapshots/ - artifact
          # upload follows symlinks causing data to be stored twice.
          model_dir = os.path.join(cache_dir, 'models--intfloat--multilingual-e5-small')
          snapshots = os.path.join(model_dir, 'snapshots')
          for root, dirs, files in os.walk(snapshots):
              for fname in files:
                  fpath = os.path.join(root, fname)
                  if os.path.islink(fpath):
                      real = os.path.realpath(fpath)
                      os.remove(fpath)
                      shutil.copy2(real, fpath)
          blobs = os.path.join(model_dir, 'blobs')
          if os.path.isdir(blobs):
              shutil.rmtree(blobs)
              print(f'Removed {blobs}, kept resolved files in snapshots/')
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedding-model
          path: models/
          retention-days: 1

  build:
    needs: download-model
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            # Build on the oldest supported LTS so the binary's glibc floor stays
            # low (2.35). load-dynamic decouples ONNX Runtime's glibc, but the
            # Rust binary still links the build host's glibc; ubuntu-latest
            # (24.04, glibc 2.39) would not run on Ubuntu 22.04.
            os: ubuntu-22.04
            artifact: nevoflux-agent-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nevoflux-agent-linux-aarch64
            use_cross: true
            # Embedding works here now: load-dynamic links no ONNX Runtime at
            # build time, so the old "ort C++ linking fails in cross Docker"
            # blocker is gone; the aarch64 runtime is bundled at package time.
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nevoflux-agent-macos-x86_64
            # ONNX Runtime 1.24.x ships no Intel-macOS (osx-x86_64) build, so no
            # version-matched runtime to bundle. Embedding off for Intel Macs.
            no_embedding: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: nevoflux-agent-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: nevoflux-agent-windows-x86_64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: nevoflux-agent-windows-aarch64
            # ort (ONNX Runtime) doesn't link on Windows ARM64 yet
            no_embedding: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Stamp the version from the git tag into Cargo.toml so that
      # `nevoflux-agent --version` prints the release version, not the
      # development placeholder.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting workspace version to ${VERSION}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          grep '^version' Cargo.toml

      # Linux x86_64: install X11 development libraries
      - name: Install Linux dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxtst-dev libwayland-dev

      # Linux aarch64: install cross tool for Docker-based cross-compilation
      - name: Install cross
        if: matrix.use_cross == true
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin

      # Build with bounded retries. The embedding build now uses `ort`'s
      # load-dynamic strategy (the default), so the build script no longer
      # downloads a prebuilt ONNX Runtime from a third-party CDN — that flaky
      # download (which once failed a whole release, v0.3.5) is gone, and the
      # matching runtime is bundled at package time instead (see below). The
      # retry wrapper is kept as cheap insurance against other transient flakes;
      # cargo/cross resume incrementally so a retry only redoes failed work.
      #
      # Flags are derived from the matrix so a single retry wrapper covers all
      # variants:
      #   - matrix.no_embedding -> --no-default-features (skips embedding/ort)
      #   - matrix.use_cross    -> `cross` instead of `cargo`
      # `shell: bash` makes the same loop run on the Windows runners too.
      - name: Build
        shell: bash
        run: |
          set -u
          flags=""
          [ "${{ matrix.no_embedding }}" = "true" ] && flags="--no-default-features"
          if [ "${{ matrix.use_cross }}" = "true" ]; then tool="cross"; else tool="cargo"; fi
          for attempt in 1 2 3; do
            echo "::group::$tool build --release --target ${{ matrix.target }} $flags (attempt $attempt/3)"
            if "$tool" build --release --target "${{ matrix.target }}" $flags; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Build attempt $attempt/3 failed (often a transient ort-sys ONNX-Runtime CDN download timeout); retrying in 30s…"
            sleep 30
          done
          echo "::error::Build failed after 3 attempts"
          exit 1

      # Download pre-cached embedding model
      - name: Download embedding model
        uses: actions/download-artifact@v4
        with:
          name: embedding-model
          path: staging/models

      # Bundle the matching ONNX Runtime next to the binary (load-dynamic
      # resolves <exe_dir>/lib/<libonnxruntime>). Official manylinux/macOS builds
      # need only glibc >= 2.27, so one binary + this lib runs on both old-glibc
      # (Ubuntu 22.04) and new (Arch) hosts. Skipped for `no_embedding` targets.
      # The release .dll/.dylib/.so excludes debug symbols (.pdb/.dSYM).
      - name: Bundle ONNX Runtime (Unix)
        if: runner.os != 'Windows' && matrix.no_embedding != true
        shell: bash
        run: |
          set -euo pipefail
          v="${ORT_VERSION}"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  pkg="onnxruntime-linux-x64-$v";     src="lib/libonnxruntime.so.$v";   dst="libonnxruntime.so" ;;
            aarch64-unknown-linux-gnu) pkg="onnxruntime-linux-aarch64-$v"; src="lib/libonnxruntime.so.$v";   dst="libonnxruntime.so" ;;
            aarch64-apple-darwin)      pkg="onnxruntime-osx-arm64-$v";     src="lib/libonnxruntime.$v.dylib"; dst="libonnxruntime.dylib" ;;
            *) echo "no ONNX Runtime bundle for ${{ matrix.target }}"; exit 0 ;;
          esac
          url="https://github.com/microsoft/onnxruntime/releases/download/v$v/$pkg.tgz"
          for attempt in 1 2 3; do
            curl -fsSL "$url" -o ort.tgz && break
            echo "::warning::ONNX Runtime download attempt $attempt/3 failed; retrying in 15s…"; sleep 15
          done
          tar xzf ort.tgz
          mkdir -p staging/lib
          cp "$pkg/$src" "staging/lib/$dst"
          ls -la staging/lib/

      - name: Bundle ONNX Runtime (Windows)
        if: runner.os == 'Windows' && matrix.no_embedding != true
        shell: pwsh
        run: |
          $v = $env:ORT_VERSION
          $pkg = "onnxruntime-win-x64-$v"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$v/$pkg.zip"
          Invoke-WebRequest -Uri $url -OutFile ort.zip
          Expand-Archive -Path ort.zip -DestinationPath ort_extract -Force
          New-Item -ItemType Directory -Force -Path staging/lib | Out-Null
          Copy-Item "ort_extract/$pkg/lib/onnxruntime.dll" "staging/lib/onnxruntime.dll"
          Get-ChildItem staging/lib

      # Package: binary + embedding model + (load-dynamic) ONNX Runtime lib
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} staging/
          cd staging
          extra=""
          [ -d lib ] && extra="lib"
          tar czf ../${{ matrix.artifact }}.tar.gz ${{ env.BINARY_NAME }} models/ $extra

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          $paths = @("staging/${{ env.BINARY_NAME }}.exe", "staging/models")
          if (Test-Path "staging/lib") { $paths += "staging/lib" }
          Compress-Archive -Path $paths -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: [download-model, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums-sha256.txt
