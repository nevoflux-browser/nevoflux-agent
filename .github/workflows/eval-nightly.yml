name: eval-nightly

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  eval-nightly:
    name: eval — mock-LLM nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-eval-nightly-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-eval-nightly-
            ${{ runner.os }}-cargo-eval-

      - name: Build daemon with eval-mock-llm feature
        run: cargo build --release --bin nevoflux-agent --features eval-mock-llm

      - name: Build eval CLI
        run: cargo build --release -p nevoflux-eval

      - name: Run nevoflux-suite mode-authz (mock LLM)
        env:
          NEVOFLUX_EVAL_LLM_MODE: mock
        run: |
          cargo run --release -p nevoflux-eval -- run \
            --benchmark nevoflux-suite \
            --browser-mode daemon-only \
            --filter mode-authz \
            --timeout 30 \
            --out-dir eval/reports/nightly

      - name: Upload report bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-nightly-reports
          path: eval/reports/nightly
          retention-days: 30
