name: release-dispatch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. eval-v0.4.0)"
        required: true
        type: string
      draft:
        description: "Create draft release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build eval — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build + package
        run: just release-eval

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-tarballs-${{ matrix.os }}
          path: dist/nevoflux-eval-*.tar.gz

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: eval-tarballs-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.draft }}
          files: dist/nevoflux-eval-*.tar.gz
